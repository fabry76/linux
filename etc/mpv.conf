# -----------------------------
# Hardware acceleration (Intel Xe)
# -----------------------------
hwdec=vaapi
vo=gpu
gpu-context=wayland,x11
hwdec-codecs=all

# -----------------------------
# Video quality (Lenovo L16 G2 panel)
# -----------------------------
profile=gpu-hq
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell
tscale=oversample

# Light sharpening for 16" FHD+ panel
scale-antiring=0.7
cscale-antiring=0.7

# -----------------------------
# HDR → SDR tone mapping
# (optimized for non‑HDR laptop display)
# -----------------------------
tone-mapping=hable
tone-mapping-param=0.35
hdr-compute-peak=yes
gamut-mapping-mode=clip

# -----------------------------
# Smooth motion (60 Hz display)
# -----------------------------
interpolation=yes
video-sync=display-resample
tscale=oversample

# -----------------------------
# Audio (PipeWire)
# -----------------------------
audio-device=pipewire
volume-max=200

# -----------------------------
# OSC (thin progress bar)
# -----------------------------
osc=yes
osc-seekbarstyle=slimbar
border=yes

# -----------------------------
# Behavior
# -----------------------------
save-position-on-quit=yes
